name: Build Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            file ca-certificates unzip \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            libsoup-3.0-dev libharfbuzz-dev libbz2-dev liblzma-dev \
            librime-dev libclang-dev clang \
            libxdo-dev xdg-utils \
            squashfs-tools libfuse2 \
            gcc libc6-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-build keytao-linux-ime
        run: |
          cargo build -p keytao-linux-ime --release
          echo "KEYTAO_IME_PATH=$PWD/target/release/keytao-ime" >> $GITHUB_ENV

      - name: Build AppImage + deb
        run: pnpm tauri build --bundles deb,appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Package bare binary for Nix
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          tar -czf "target/release/bundle/keytao-installer-${VERSION}-linux-x86_64.tar.gz" \
            -C target/release keytao-installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/*.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/*.tar.gz
